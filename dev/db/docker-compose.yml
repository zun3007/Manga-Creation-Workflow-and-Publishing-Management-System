services:
  mysql:
    image: mysql:8.0
    container_name: manga-dev-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: manga_root
    ports:
      - "3308:3306"   # host 3308 -> container 3306 (avoids clashing with demo's 3307)
    volumes:
      - ./:/docker-entrypoint-initdb.d:ro   # 01-schema.sql + 02-seed.sql run on first init
      - manga-dev-db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30

volumes:
  manga-dev-db-data:
